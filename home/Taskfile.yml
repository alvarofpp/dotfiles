# https://taskfile.dev

version: '3'
silent: false

includes:
  cc: ./taskfiles/ClaudeCode.yml
  docker: ./taskfiles/Docker.yml
  op: ./taskfiles/Operations.yml
  py: ./taskfiles/Python.yml
  ai:
    taskfile: $HOME/dotfiles/ai/taskfiles/AI.yml
    optional: true

tasks:
  default:
    desc: "List all tasks."
    cmds:
      - task --list-all
